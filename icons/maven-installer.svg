<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
  <!-- Box representing a package -->
  <polyline points="21 8 21 21 3 21 3 8" />
  <rect x="1" y="3" width="22" height="5" rx="1" />
  <!-- RPM / DEB split down the middle -->
  <line x1="12" y1="8" x2="12" y2="21" stroke-dasharray="2 2" />
  <!-- Label hints -->
  <text x="6.5" y="17" font-size="4" text-anchor="middle" stroke="none" fill="currentColor">RPM</text>
  <text x="17.5" y="17" font-size="4" text-anchor="middle" stroke="none" fill="currentColor">DEB</text>
</svg>
