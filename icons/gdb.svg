<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
  <!-- Terminal window -->
  <rect x="2" y="3" width="20" height="16" rx="2" />
  <!-- Prompt chevron -->
  <polyline points="6 10 9 13 6 16" />
  <!-- Cursor / breakpoint dot -->
  <circle cx="17" cy="13" r="1.5" fill="currentColor" stroke="none" />
  <!-- Underline suggesting input line -->
  <line x1="12" y1="16" x2="15" y2="16" />
</svg>
