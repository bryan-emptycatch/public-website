<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
  <!-- Memory blocks (heap) -->
  <rect x="2" y="4" width="5" height="3.5" rx="0.5" />
  <rect x="2" y="9.5" width="5" height="3.5" rx="0.5" />
  <rect x="2" y="15" width="5" height="3.5" rx="0.5" />
  <!-- Leak line from middle block -->
  <line x1="7" y1="11.25" x2="10" y2="11.25" stroke-dasharray="1.2 1.2" />
  <circle cx="11" cy="11.25" r="0.7" fill="currentColor" stroke="none" />
  <!-- Magnifying glass -->
  <circle cx="17" cy="9" r="4" />
  <line x1="20.8" y1="12.8" x2="22.5" y2="14.5" />
</svg>
